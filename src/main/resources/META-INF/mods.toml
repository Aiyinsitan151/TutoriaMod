# 这是一份 mods.toml 示例文件，存放模组加载相关配置
# 文件包含若干必填字段（#mandatory）以及大量可选字段（#optional）
# 文件整体采用标准 TOML v0.5.0 格式
# 注意：本文件内包含多处 TOML 数组列表写法
# TOML 格式文档参考：https://github.com/toml-lang/toml

# 模组加载器类型。常规使用 @Mod 注解的FML模组固定填写 javafml
modLoader = "javafml" #【必填】
# 加载器版本约束范围。常规FML模组代表 Forge 版本区间
loaderVersion = "${loader_version_range}" #【必填】
# Forge 每个MC大版本通常会更新此项，可前往Forge下载页查看可用版本范围

# 模组开源协议。必填元数据，用于明确模组分发权限
# 协议选择网站：https://choosealicense.com/
# 默认保留所有版权，不开放授权
license = "${mod_license}"

# 玩家遇到模组问题时跳转的反馈地址（可选）
#issueTrackerURL="https://change.me.to.your.issue.tracker.example.invalid/" #可选

# 模组列表，单个jar支持定义多个模组
[[mods]] #【必填】
# 模组唯一ID
modId = "${mod_id}" #【必填】
# 模组版本号
version = "${mod_version}" #【必填】
# 模组显示名称（游戏内模组列表展示名）
displayName = "${mod_name}" #【必填】

# 更新检测JSON地址，更新检查器规范文档：https://docs.minecraftforge.net/en/latest/misc/updatechecker/
#updateJSONURL="https://change.me.example.invalid/updates.json" #可选

# 模组主页链接，在模组界面展示
#displayURL="https://change.me.to.your.mods.homepage.example.invalid/" #可选

# Jar包根目录下的logo图片文件名（模组界面图标）
#logoFile="tutoriamod.png" #可选

# 致谢文字，模组界面展示
credits="Thanks for this example mod goes to Java" #可选

# 作者信息
authors = "${mod_authors}" #可选

# 版本校验规则：控制联机时模组版本不匹配是否标红警告
# MATCH_VERSION：客户端与服务器模组版本不一致就标红（默认），同时拥有客户端/服务器逻辑的模组请选此项
# IGNORE_SERVER_VERSION：仅服务端存在该模组、客户端没有时不告警，适合纯服务端模组
# IGNORE_ALL_VERSION：两端任意一端存在模组都不触发版本校验，仅适用于完全无服务端逻辑的客户端模组
# NONE：不使用内置校验，需要自己实现 IExtensionPoint.DisplayTest 自定义校验逻辑
# 重要提醒：**此项不能控制模组在客户端/服务端是否加载**，模组会在两端均加载，代码内自行区分环境
#displayTest="MATCH_VERSION" # 不填写默认 MATCH_VERSION 【可选】

# 模组介绍（支持多行文本）【必填】
description = '''${mod_description}'''

# 依赖声明，格式 [[dependencies."模组ID"]]，依赖配置可选
[[dependencies."${mod_id}"]] #可选
# 依赖模组ID
modId = "forge" #【必填】
# 是否强制依赖：true=缺少该依赖模组无法启动；false=可选依赖，必须指定加载先后顺序
mandatory = true #【必填】
# 依赖所需版本区间
versionRange = "${forge_version_range}" #【必填】
# 加载顺序，依赖为非强制时才需要 BEFORE / AFTER
# BEFORE：本模组 在依赖模组 之前加载
# AFTER：本模组 在依赖模组 之后加载
ordering = "NONE"
# 依赖生效环境：BOTH(两端)、CLIENT(仅客户端)、SERVER(仅服务端)
side = "BOTH"

# 第二条依赖（Minecraft本体）
[[dependencies."${mod_id}"]]
modId = "minecraft"
mandatory = true
# 版本范围写法：最低当前MC版本，不包含下一个大版本
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"